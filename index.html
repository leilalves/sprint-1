<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="./assets/img/favicon.png">
    <title>Echoes Discos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                    <a class="nav-link" href="#">Alta</a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link" href="#">Catálogo</a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link" href="#">Sobre</a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link" href="#">Contato</a>
                    </li>
                </ul>
            </div>
        </div>
        
        
        <i class="fa-solid fa-magnifying-glass fa-xl" style="color: #ab6900; width: 3rem;"></i>
        <i class="fa-regular fa-user fa-xl" style="color: #ab6900;"></i>
    </nav>

    <section class="hero">

        <div class="title">
            <h1 class="echoes">ECHOES</h1>
            <p class="desc">Música que você toca</p>
            <h1 class="discos">DISCOS</h1>
        </div>

        <div class="button">
            <a href="#catalogue" class="btn">ache seu disco<svg width="50" height="50" fill="none" viewBox="0 0 24 24"> <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17.25 8.75V17.25H8.75"></path><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 17L6.75 6.75"></path>
            </svg></a>
        </div>

        <div class="arm">
            <img src="./assets/img/bracoreso.png" class="arm-vinyl" alt="Mão segurando disco">
        </div>
    </section>

    <div id="customCarousel" class="carousel slide" data-bs-ride="carousel">

  <div class="carousel-inner">

    <!-- SLIDE 1 -->
    <div class="carousel-item active" data-bg="#320D01">
      <div class="carousel-content">

        <h1 class="bg-text">DRA<br>CU<br>LA</h1>

        <img src="./assets/img/dracula.png" class="disco-principal">

        <div class="side-preview left">
          <img src="./assets/img/mansbff.png">
        </div>

        <div class="side-preview right">
          <img src="./assets/img/dtmf.png">
        </div>

      </div>
    </div>

    <!-- SLIDE 2 -->
    <div class="carousel-item" data-bg="#003459">
      <div class="carousel-content">
        
        <h1 class="bg-text">DEBÍ<br>TIRAR<br>MAS<br>FOTOS</h1>

        <img src="./assets/img/dtmf.png" class="disco-principal">

        <div class="side-preview left">
          <img src="./assets/img/dracula.png">
        </div>

        <div class="side-preview right">
          <img src="./assets/img/mansbff.png">
        </div>

      </div>
    </div>

    <!-- SLIDE 3 -->
    <div class="carousel-item" data-bg="#80BFD3">
      <div class="carousel-content">

        <h1 class="bg-text">MAN'S<br>BEST<br>FRIEND</h1>

        <img src="./assets/img/mansbff.png" class="disco-principal">

        <div class="side-preview left">
          <img src="./assets/img/dtmf.png">
        </div>

        <div class="side-preview right">
          <img src="./assets/img/dracula.png">
        </div>

      </div>
    </div>

  </div>

  <!-- CONTROLES -->
  <button class="carousel-control-prev" type="button" data-bs-target="#customCarousel" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>

  <button class="carousel-control-next" type="button" data-bs-target="#customCarousel" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>

</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="style.css"></script>
</body>
</html>
